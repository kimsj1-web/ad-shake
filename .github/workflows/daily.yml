name: 단백질쉐이크 광고 아카이브 자동 업데이트

on:
  schedule:
    # 3시간마다 실행 (KST 기준 0/3/6/9/12/15/18/21시)
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      date_start:
        description: "성과 조회 시작일 (YYYY-MM-DD) — 비우면 최근 30일"
        required: false
        default: ""
      date_stop:
        description: "성과 조회 종료일 (YYYY-MM-DD)"
        required: false
        default: ""
      media_mode:
        description: "수집 유형 — image(이미지만) / video(영상만) / all(둘 다)"
        required: false
        default: "all"

jobs:
  update-archive:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 광고 데이터 수집 및 HTML 생성
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          DATE_START: ${{ github.event.inputs.date_start }}
          DATE_STOP: ${{ github.event.inputs.date_stop }}
          MEDIA_MODE: ${{ github.event.inputs.media_mode || 'all' }}
        run: python fetch_ads.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archive.json images/
          git diff --staged --quiet || git commit -m "chore: 단백질쉐이크 광고 아카이브 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push
